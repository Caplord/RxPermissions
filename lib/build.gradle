apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    namespace "com.github.tbruyelle.rxpermissions"
    compileSdkVersion rootProject.ext.compileSdkVersion

    compileOptions {
        // Compile with Java 17 for Android AGP compatibility
        // but use Java 21 toolchain for the build environment
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionName rootProject.ext.libraryVersion
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    testOptions.unitTests.includeAndroidResources = true
    testOptions.unitTests.all {
        // unitTests.returnDefaultValues = true
        // Always show the result of every unit test, even if it passes.
        it.jvmArgs += [
                '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
                '--add-opens', 'java.base/java.io=ALL-UNNAMED'
            ]
        testLogging {
            events 'passed', 'skipped', 'failed', 'standardOut', 'standardError'
        }
    }
}

// TODO: Configure Java 21 toolchain once AGP has better Java 21 support
// Currently AGP 8.1.0 has jdkImage transform issues with Java 21
// Foojay auto-provisioning is enabled in settings.gradle for future use
// java {
//     toolchain {
//         languageVersion = JavaLanguageVersion.of(21)
//     }
// }

dependencies {
    implementation(rootProject.ext.rxJava) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    implementation(rootProject.ext.androidXFragment) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    implementation(rootProject.ext.androidXAnnotation) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    implementation(rootProject.ext.androidXAppcompat) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }

    testImplementation 'junit:junit:4.13'
    testImplementation(rootProject.ext.mockito) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    testImplementation(rootProject.ext.robolectric) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    testImplementation rootProject.ext.khronosOpenGLApi
}

// JitPack handles publishing, so explicit maven-publish is disabled for now
// TODO: Update publishing configuration for AGP 8.0+ compatibility